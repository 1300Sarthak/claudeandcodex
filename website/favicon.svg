<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A6FA5"/>
      <stop offset="100%" style="stop-color:#6082B6"/>
    </linearGradient>
    <clipPath id="clip">
      <rect width="32" height="32" rx="6"/>
    </clipPath>
  </defs>
  <rect width="32" height="32" rx="6" fill="url(#bg)"/>
  <g clip-path="url(#clip)">
    <ellipse cx="6" cy="4" rx="20" ry="20" fill="#7B9CC8" opacity="0.35"/>
  </g>
  <!-- Bar chart: 3 ascending bars -->
  <rect x="6"  y="20" width="5" height="8"  rx="1.5" fill="white" opacity="0.75"/>
  <rect x="13" y="15" width="5" height="13" rx="1.5" fill="white" opacity="0.9"/>
  <rect x="20" y="10" width="5" height="18" rx="1.5" fill="white"/>
</svg>
